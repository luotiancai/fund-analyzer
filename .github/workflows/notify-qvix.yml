name: QVIX 恐慌指数推送

on:
  # GitHub 自己的 schedule 触发器高峰期会迟到几十分钟到数小时甚至整次丢弃
  # (实测撞过:预定北京 12:47,实际 15:25 才启动,邮件跟着晚点到收盘后才发,
  # 完全失去"盘中"提醒的意义)。改由外部精确定时服务(如 cron-job.org)在
  # 北京 14:40 直接调 GitHub API 触发本工作流的 workflow_dispatch——这条
  # 触发路径不走那条拥堵的 schedule 队列,秒级启动,不再需要脚本内"提前
  # 启动+睡到点"的补偿或多重 cron 兜底去重。
  workflow_dispatch: {}

permissions:
  contents: write   # gh release upload 需要(回写刷新后的 QVIX 缓存)

jobs:
  notify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      FUND_ANALYZER_DATA: ${{ github.workspace }}/.data
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: 安装依赖(不装 streamlit)
        run: pip install --quiet requests pandas numpy akshare
      - name: 取回数据库(Release tag data,否则每次空跑都要现场活取QVIX历史)
        run: |
          mkdir -p "$FUND_ANALYZER_DATA"
          gh release download data --pattern fund_cache.db.gz \
               --output db.gz --repo "$GITHUB_REPOSITORY" \
            && gunzip -c db.gz > "$FUND_ANALYZER_DATA/fund_cache.db" && rm db.gz \
            || echo "::warning::release 不存在或下载失败,本次仍会现场活取"
      - name: 推送 QVIX 与恐慌阈值
        env:
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          MAIL_TO: 506804924@qq.com
        run: python notify_qvix.py
      - name: 回传刷新后的数据库(仅当本次成功拿到新 QVIX 数据)
        if: success()
        run: |
          gzip -9 -c "$FUND_ANALYZER_DATA/fund_cache.db" > fund_cache.db.gz
          gh release upload data fund_cache.db.gz --clobber \
            --repo "$GITHUB_REPOSITORY" || true
