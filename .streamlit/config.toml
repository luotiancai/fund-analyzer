# 隐藏右上角的 Deploy 按钮和「⋮」开发者菜单，界面更清爽。
# 改回开发者工具：把 toolbarMode 改为 "auto" 或 "developer"。
[client]
toolbarMode = "minimal"

# 关闭源码文件监视器：每次 rerun 后 LocalSourcesWatcher 会遍历 sys.modules
# 对几千个模块文件做 realpath/isfile，在 /mnt/c 的 9p 文件系统上实测每次
# ~26s，期间事件循环被拖住、页面点击全部无响应（py-spy --idle 火焰图定位，
# update_watched_modules 占大头）。本地改代码本来就靠手动重启（模块热加载
# 有坑），云端无人改文件，两边都用不上 watcher。
[server]
fileWatcherType = "none"

[browser]
gatherUsageStats = false
